  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

le: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"11bb5db9-a777-43d3-8719-fd139e30f67b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"96e114f9-975b-4eee-8d37-405d068a33f6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"11bb5db9-a777-43d3-8719-fd139e30f67b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"96e114f9-975b-4eee-8d37-405d068a33f6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{\n    --accent:rgb(140 69 255);\n    --accent-2:rgb(155 90 255);\n    --bg:#0e0e0e;\n    --bg-2:#161616;\n    --card:#1a1a1a;\n    --card-2:#1f1f1f;\n    --line:rgba(255,255,255,0.10);\n    --line-strong:rgba(255,255,255,0.18);\n    --fg:#ffffff;\n    --fg-dim:rgba(255,255,255,0.65);\n    --fg-muted:rgba(255,255,255,0.45);\n    --black:#000;\n    --max:1360px;\n    --radius-pill:999px;\n    --radius-card:20px;\n    --radius-block:24px;\n    --ease:cubic-bezier(.3,1,.3,1);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    background:var(--bg);\n    color:var(--fg);\n    font-family:\"DM Sans\",system-ui,sans-serif;\n    font-weight:400;\n    font-size:16px;\n    line-height:1.55;\n    -webkit-font-smoothing:antialiased;\n  }\n  a{color:inherit;text-decoration:none}\n  img{max-width:100%;display:block}\n  h1,h2,h3,h4{font-weight:500;letter-spacing:-0.04em;margin:0;line-height:1.1}\n  h1{font-size:clamp(40px,5.6vw,72px)}\n  h2{font-size:clamp(30px,3.4vw,48px);letter-spacing:-0.035em}\n  h3{font-size:clamp(20px,1.8vw,26px);letter-spacing:-0.02em}\n  .container{max-width:var(--max);margin:0 auto;padding:0 32px}\n  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-dim);font-weight:500}\n  .divider{height:1px;background:var(--line);width:100%}\n  .accent{color:var(--accent)}\n\n  /* ===== Marquee ticker ===== */\n  .ticker{\n    background:var(--accent);\n    color:#fff;\n    overflow:hidden;\n    border-bottom:none;\n    font-size:13px;font-weight:500;letter-spacing:.02em;\n  }\n  .ticker-track{\n    display:flex;gap:48px;\n    padding:10px 0;\n    white-space:nowrap;\n    animation:ticker 40s linear infinite;\n    width:max-content;\n  }\n  .ticker-item{display:inline-flex;align-items:center;gap:48px}\n  .ticker-item::after{content:\"\";display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;opacity:.85}\n  @keyframes ticker{\n    from{transform:translateX(0)}\n    to{transform:translateX(-50%)}\n  }\n\n  /* ===== Top nav ===== */\n  .topnav{\n    position:sticky;top:0;z-index:50;\n    background:rgba(14,14,14,.92);\n    backdrop-filter:blur(8px);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{\n    display:flex;align-items:center;justify-content:space-between;\n    height:64px;\n  }\n  .logo{\n    font-weight:700;letter-spacing:.18em;font-size:13px;\n    display:flex;align-items:center;gap:8px;\n  }\n  .logo .dot{width:7px;height:7px;background:var(--accent);border-radius:50%}\n  .nav-links{display:flex;gap:36px;align-items:center;font-size:14px;color:var(--fg-dim)}\n  .nav-links a:hover{color:var(--fg)}\n  .nav-right{display:flex;align-items:center;gap:18px}\n  .icon-btn{\n    width:36px;height:36px;border-radius:50%;\n    display:inline-flex;align-items:center;justify-content:center;\n    color:var(--fg-dim);\n  }\n  .btn{\n    display:inline-flex;align-items:center;gap:10px;\n    height:44px;padding:0 22px;border-radius:var(--radius-pill);\n    font-weight:500;font-size:14px;letter-spacing:.02em;\n    background:#fff;color:#000;border:none;cursor:pointer;\n    transition:transform .3s var(--ease),background .3s var(--ease),color .3s var(--ease);\n  }\n  .btn--accent{background:var(--accent);color:#fff}\n  .btn--accent:hover{background:rgb(160 100 255)}\n  .btn--ghost{background:transparent;color:#fff;border:1px solid var(--line-strong)}\n  .btn--ghost:hover{background:rgba(255,255,255,.06)}\n  .btn--dark{background:#000;color:#fff;border:1px solid #000}\n  .btn--lg{height:52px;padding:0 26px;font-size:14px}\n  .btn--block{justify-content:space-between;width:100%}\n  .btn .plus{\n    width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.18);\n    display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:14px;line-height:1;\n  }\n  .btn--dark .plus{background:rgba(255,255,255,.12)}\n\n  /* ===== Hero ===== */\n  .hero{padding:80px 0 56px;position:relative}\n  .hero h1{max-width:760px}\n  .hero p.lead{\n    max-width:520px;color:var(--fg-dim);\n    margin-top:28px;font-size:16px;line-height:1.6;\n  }\n  .hero-grid{\n    display:grid;grid-template-columns:1fr 1fr;gap:24px;\n    margin-top:64px;\n  }\n  .hero-card{\n    background:var(--card);border-radius:var(--radius-block);\n    padding:32px;display:flex;flex-direction:column;gap:18px;\n    min-height:480px;position:relative;overflow:hidden;\n  }\n  .hero-card .top{display:flex;align-items:center;gap:10px;color:var(--fg-dim);font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:500}\n  .hero-card .top svg{width:18px;height:18px;stroke:var(--fg-dim)}\n  .hero-card h3{font-size:clamp(22px,2.2vw,32px);max-width:420px}\n  .hero-card .body{color:var(--fg-dim);font-size:14.5px;line-height:1.55;max-width:440px}\n  .hero-card .img{\n    flex:1;border-radius:14px;margin-top:8px;background:#222;position:relative;overflow:hidden;min-height:210px;\n  }\n  .hero-card .img::after{\n    content:\"\";position:absolute;inset:0;\n    background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.45) 100%);\n  }\n  .hero-card .img-1{\n    background:\n      radial-gradient(circle at 30% 30%, rgba(255,90,54,.25), transparent 50%),\n      linear-gradient(135deg,#3a342e,#1d1612 70%);\n  }\n  .hero-card .img-1::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 400\"><defs><linearGradient id=\"g\" x1=\"0\" x2=\"1\"><stop offset=\"0\" stop-color=\"%23574a40\"/><stop offset=\"1\" stop-color=\"%231f1812\"/><\u002FlinearGradient><\u002Fdefs><rect width=\"800\" height=\"400\" fill=\"url(%23g)\"/><circle cx=\"280\" cy=\"240\" r=\"90\" fill=\"%23222\" opacity=\".7\"/><rect x=\"200\" y=\"220\" width=\"160\" height=\"60\" rx=\"10\" fill=\"%2336291f\" opacity=\".8\"/><rect x=\"190\" y=\"250\" width=\"180\" height=\"120\" fill=\"%231a120c\" opacity=\".7\"/><\u002Fsvg>');\n    background-size:cover;background-position:center;\n    filter:saturate(.85) contrast(1.05);\n  }\n  .hero-card .img-2{\n    background:linear-gradient(135deg,#2a1a14,#3d2820);\n  }\n  .hero-card .img-2::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 400\"><defs><linearGradient id=\"sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"%23c08a72\"/><stop offset=\"1\" stop-color=\"%237a4d3a\"/><\u002FlinearGradient><linearGradient id=\"ground\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"%238a6b4f\"/><stop offset=\"1\" stop-color=\"%234a341f\"/><\u002FlinearGradient><\u002Fdefs><rect width=\"800\" height=\"220\" fill=\"url(%23sky)\"/><rect y=\"220\" width=\"800\" height=\"180\" fill=\"url(%23ground)\"/><g fill=\"%23241712\"><rect x=\"120\" y=\"120\" width=\"22\" height=\"180\"/><rect x=\"280\" y=\"100\" width=\"20\" height=\"200\"/><rect x=\"450\" y=\"130\" width=\"24\" height=\"170\"/><rect x=\"620\" y=\"110\" width=\"20\" height=\"190\"/><\u002Fg><g fill=\"%231f130c\" opacity=\".8\"><ellipse cx=\"131\" cy=\"120\" rx=\"42\" ry=\"36\"/><ellipse cx=\"290\" cy=\"100\" rx=\"48\" ry=\"42\"/><ellipse cx=\"462\" cy=\"130\" rx=\"46\" ry=\"38\"/><ellipse cx=\"630\" cy=\"110\" rx=\"44\" ry=\"38\"/><\u002Fg><\u002Fsvg>');\n    background-size:cover;background-position:center;\n  }\n  .hero-card .cta-row{display:flex;gap:12px;margin-top:auto;position:relative;z-index:2}\n  .hero-card .cta-row .btn{padding:0 22px}\n\n  .hero .partner-badge{\n    position:absolute;top:96px;right:32px;\n    background:#fff;color:#000;border-radius:8px;\n    padding:10px 14px;display:flex;align-items:center;gap:10px;\n    font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;line-height:1.15;\n    box-shadow:0 6px 20px rgba(0,0,0,.35);\n  }\n  .partner-badge .lock{\n    width:28px;height:28px;border-radius:6px;background:#000;color:#fff;\n    display:inline-flex;align-items:center;justify-content:center;\n  }\n\n  /* ===== Logo strip ===== */\n  .logos{\n    background:var(--bg-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);\n    padding:28px 0;\n  }\n  .logos-grid{\n    display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);\n    border-radius:8px;overflow:hidden;\n  }\n  .logos-grid .cell{\n    background:var(--bg-2);\n    height:90px;display:flex;align-items:center;justify-content:center;\n    color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.04em;\n  }\n  .logos-grid .cell span{font-size:18px;opacity:.85}\n  .logos-grid .cell.serif{font-family:\"Times New Roman\",Georgia,serif;font-style:italic}\n\n  /* ===== Section header ===== */\n  section.block{padding:96px 0}\n  .block-head{display:flex;flex-direction:column;gap:14px;margin-bottom:48px}\n  .block-head .top-line{display:flex;justify-content:space-between;align-items:center;gap:24px;border-top:1px solid var(--line);padding-top:24px}\n  .block-head .top-line .eyebrow{margin:0}\n  .block-head h2{max-width:900px}\n  .block-head .lead{color:var(--fg-dim);max-width:780px;font-size:17px;line-height:1.55}\n\n  /* ===== Light section ===== */\n  .light{background:#fff;color:#0a0a0a}\n  .light .eyebrow{color:rgba(0,0,0,.55)}\n  .light h2{color:#0a0a0a}\n  .light .lead{color:rgba(0,0,0,.7)}\n  .light .divider, .light .block-head .top-line{border-color:rgba(0,0,0,.12)}\n\n  /* ===== Shopify Agency (light) ===== */\n  .agency-hero{\n    margin-top:24px;background:#0a0a0a;border-radius:var(--radius-block);\n    padding:80px;display:flex;align-items:center;justify-content:center;min-height:620px;position:relative;overflow:hidden;\n  }\n  .agency-hero .browser{\n    width:78%;max-width:880px;background:#fff;color:#222;border-radius:14px;overflow:hidden;\n    box-shadow:0 30px 80px rgba(0,0,0,.4);\n    transform:perspective(1500px) rotateY(-2deg) rotateX(2deg);\n  }\n  .agency-hero .browser .bar{\n    height:38px;background:#fff;border-bottom:1px solid #eee;\n    display:flex;align-items:center;padding:0 14px;gap:6px;\n  }\n  .agency-hero .browser .bar .b{width:9px;height:9px;border-radius:50%;background:#e1e1e1}\n  .agency-hero .browser .topbar{\n    display:flex;align-items:center;justify-content:space-between;padding:14px 20px;\n    border-bottom:1px solid #f0f0f0;font-size:11px;color:#666;\n  }\n  .agency-hero .browser .topbar .brand{font-weight:700;font-size:14px;color:#d63a2f;display:flex;align-items:center;gap:8px}\n  .agency-hero .browser .topbar .brand::before{content:\"\";width:18px;height:18px;background:#d63a2f;mask:radial-gradient(circle at 50% 50%, #000 40%, transparent 41%);}\n  .agency-hero .browser .topbar nav{display:flex;gap:20px;font-size:11px;letter-spacing:.05em}\n  .agency-hero .browser .topbar .order{background:#d63a2f;color:#fff;padding:6px 14px;border-radius:30px;font-weight:600}\n  .agency-hero .browser .stage{\n    height:340px;background:linear-gradient(135deg,#eee,#cfcfcf);position:relative;display:flex;align-items:center;justify-content:center;\n    background-image:\n      radial-gradient(circle at 20% 80%, rgba(0,0,0,.3), transparent 40%),\n      radial-gradient(circle at 80% 20%, rgba(0,0,0,.18), transparent 50%),\n      linear-gradient(135deg,#dcdcdc,#a8a8a8);\n  }\n  .agency-hero .stage h3{\n    font-family:Georgia,\"Times New Roman\",serif;font-weight:700;font-size:38px;color:#222;letter-spacing:0;text-align:center;line-height:1.1;\n  }\n  .agency-hero .stage h3 .red{color:#d63a2f}\n  .agency-hero .stage .pill{\n    margin-top:18px;background:#ff8b78;color:#fff;font-weight:600;padding:10px 22px;border-radius:30px;font-size:12px;display:inline-block;text-align:center;\n  }\n  .agency-hero .browser .footer-strip{\n    height:36px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:10px;color:#888;\n  }\n  .agency-hero .browser .footer-strip nav{display:flex;gap:18px}\n\n  /* ===== Testimonials ===== */\n  .test-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}\n  .test-card{\n    background:var(--card);border-radius:var(--radius-block);padding:32px;\n    display:flex;flex-direction:column;gap:18px;min-height:340px;\n  }\n  .test-head{display:flex;align-items:center;gap:14px}\n  .test-logo{\n    width:40px;height:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:11px;letter-spacing:.04em;\n  }\n  .test-name{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-dim);font-weight:500}\n  .test-card h3{font-size:22px;line-height:1.25;letter-spacing:-0.02em}\n  .test-card p{color:var(--fg-dim);font-size:14.5px;line-height:1.55;margin:0}\n  .test-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:14px}\n  .stars{display:flex;gap:2px;color:var(--accent);font-size:18px;line-height:1}\n  .stars + .meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-muted);margin-top:8px;font-weight:500}\n  .years{display:flex;align-items:center;gap:10px}\n  .years .badge{\n    width:30px;height:30px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;\n  }\n  .years .badge svg{width:14px;height:14px}\n  .years .num{font-size:24px;font-weight:500;letter-spacing:-.02em}\n  .years-meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-muted);font-weight:500;margin-top:6px;text-align:right}\n\n  /* ===== Case studies ===== */\n  .cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px 32px}\n  .case h4{\n    font-size:22px;font-weight:500;margin-bottom:18px;letter-spacing:-0.02em;color:#fff;\n    display:flex;align-items:center;gap:10px;\n  }\n  .case h4::before{\n    content:\"//\";color:var(--accent);font-weight:700;\n  }\n  .case .frame{\n    background:#fff;border-radius:14px;overflow:hidden;aspect-ratio:16/10;position:relative;\n    box-shadow:0 8px 30px rgba(0,0,0,.4);\n  }\n\n  /* Case 1 — Zia Tile */\n  .case-zia{\n    background:linear-gradient(180deg,#3a3127 0%,#2a2520 50%,#fff 50%);\n    position:relative;\n  }\n  .case-zia::before{\n    content:\"\";position:absolute;inset:0 0 50% 0;\n    background:\n      repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 60px, rgba(0,0,0,.06) 60px 120px),\n      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 36px, rgba(0,0,0,.08) 36px 72px),\n      linear-gradient(135deg,#867058,#564a3c);\n  }\n  .case-zia .top-bar{position:absolute;top:0;left:0;right:0;height:32px;display:flex;align-items:center;padding:0 16px;font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.1em;justify-content:space-between;z-index:2}\n  .case-zia .label{position:absolute;top:60px;left:30px;color:#fff;z-index:2}\n  .case-zia .label .small{font-size:9px;letter-spacing:.18em;opacity:.8}\n  .case-zia .label h5{font-family:Georgia,serif;font-size:24px;line-height:1.05;font-weight:400;margin-top:6px}\n  .case-zia .shop-by{position:absolute;bottom:80px;left:30px;font-weight:700;font-size:11px;letter-spacing:.12em;color:#222;z-index:2}\n  .case-zia .tiles{\n    position:absolute;left:30px;right:30px;bottom:18px;height:60px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;z-index:2;\n  }\n  .case-zia .tiles .t{border-radius:4px}\n  .case-zia .tiles .t:nth-child(1){background:#5d6f4a}\n  .case-zia .tiles .t:nth-child(2){background:#caa14b}\n  .case-zia .tiles .t:nth-child(3){background:#a85b48}\n  .case-zia .tiles .t:nth-child(4){background:#3e6e6a}\n  .case-zia .tiles .t:nth-child(5){background:#234a6e}\n\n  /* Case 2 — Cousins Maine Lobster */\n  .case-cml{background:#fff;color:#222;display:flex;flex-direction:column;padding:18px 24px;gap:8px}\n  .case-cml .nav{display:flex;justify-content:space-between;font-size:9px;color:#666;letter-spacing:.08em;border-bottom:1px solid #eee;padding-bottom:8px}\n  .case-cml .icons-row{display:flex;justify-content:center;gap:36px;margin-top:14px}\n  .case-cml .ic{\n    width:80px;height:80px;border-radius:50%;border:1px dashed #d63a2f;display:flex;align-items:center;justify-content:center;color:#d63a2f;\n    font-size:11px;text-align:center;font-weight:600;\n  }\n  .case-cml .icons-labels{display:flex;justify-content:center;gap:14px;margin-top:4px}\n  .case-cml .icons-labels span{flex:0 0 80px;text-align:center;color:#d63a2f;font-size:7px;l
